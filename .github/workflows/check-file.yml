name: Check Required File

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for required file
        id: check
        run: |
          REQUIRED_FILE="vite.config.js"

          if [ -f "$REQUIRED_FILE" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "✅ Required file '$REQUIRED_FILE' exists in the PR."
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "❌ Required file '$REQUIRED_FILE' is missing from this PR."
            exit 1
          fi
